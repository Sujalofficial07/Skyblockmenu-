# SkyBlock Collections Module Configuration

collections:
  # Whether to show tier-up messages in chat
  tierup-messages: true

  # Whether to only count items mined/killed/fished (not crafted/traded)
  only-count-obtained: true

  # Collection amount multiplier (default 1.0)
  amount-multiplier: 1.0

  # Tier thresholds per category (amount required for each tier)
  tiers:
    farming:
      - 50
      - 100
      - 250
      - 500
      - 1000
      - 2500
      - 5000
      - 10000
      - 50000
    mining:
      - 50
      - 100
      - 250
      - 500
      - 1000
      - 2500
      - 5000
      - 10000
      - 50000
    combat:
      - 50
      - 100
      - 250
      - 500
      - 1000
      - 2500
      - 5000
      - 10000
      - 50000
    fishing:
      - 20
      - 50
      - 100
      - 250
      - 500
      - 1000
      - 2500
      - 5000
      - 25000
    foraging:
      - 50
      - 100
      - 250
      - 500
      - 1000
      - 2500
      - 5000
      - 10000
      - 50000

  # Tier-up message format
  messages:
    tierup: "&r &r&6&l  COLLECTION TIER UP &r&e{collection} &r&7Tier {old} ➜ &r&e{new}"
    info: "&r &r&7Keep collecting &e{collection}&7 to unlock more rewards!"

  # GUI settings
  gui:
    main-title: "&0Collections"
    category-title: "&0{category} Collections"
    detail-title: "&0{collection} Collection"
    size: 54
    progress-bar-length: 20
    progress-bar-filled-char: "█"
    progress-bar-empty-char: "░"
    progress-bar-filled-color: "&6"
    progress-bar-empty-color: "&8"
