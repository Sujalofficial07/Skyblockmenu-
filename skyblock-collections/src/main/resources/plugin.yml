name: SkyBlockCollections
version: 1.0.0
main: com.skyblock.collections.SkyBlockCollectionsPlugin
api-version: '1.21'
description: SkyBlock Collections Module
authors: [ SkyBlock Team ]
depend: [ SkyBlockUtils, SkyBlockDatabase, SkyBlockMenu ]

commands:
  collections:
    description: Opens the Collections menu
    usage: /collections
    permission: skyblock.collections.use
    aliases: [ collection, col ]
  addcollection:
    description: Add collection amount to a player (admin)
    usage: /addcollection <player> <collection> <amount>
    permission: skyblock.collections.admin

permissions:
  skyblock.collections.use:
    description: Allows opening the collections menu
    default: true
  skyblock.collections.admin:
    description: Allows admin collection commands
    default: op
