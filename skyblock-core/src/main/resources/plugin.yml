name: SkyBlock
version: 1.0.0
main: com.skyblock.core.SkyBlockPlugin
api-version: '1.21'
description: Hypixel SkyBlock Menu System Clone - Core Module
authors: [ SkyBlock Team ]
website: https://github.com/skyblock/skyblock
depend: [ SkyBlockUtils, SkyBlockDatabase, SkyBlockMenu, SkyBlockSkills, SkyBlockCollections ]

commands:
  skyblock:
    description: Main SkyBlock command
    usage: /skyblock [menu|item|reload|help]
    permission: skyblock.use
    aliases: [ sb, sky ]
  skills:
    description: Opens the Skills menu
    usage: /skills
    permission: skyblock.use
    aliases: [ skill, myskills ]
  collections:
    description: Opens the Collections menu
    usage: /collections
    permission: skyblock.use
    aliases: [ collection, col ]
  givexp:
    description: Give skill XP to a player
    usage: /givexp <player> <skill> <amount>
    permission: skyblock.admin
  addcollection:
    description: Add collection amount to a player
    usage: /addcollection <player> <collection> <amount>
    permission: skyblock.admin
  skyblockadmin:
    description: SkyBlock admin commands
    usage: /skyblockadmin <reload|reset|info>
    permission: skyblock.admin
    aliases: [ sbadmin ]

permissions:
  skyblock.use:
    description: Allows using SkyBlock commands
    default: true
  skyblock.admin:
    description: Allows using admin SkyBlock commands
    default: op
  skyblock.menu.use:
    description: Allows opening the SkyBlock menu
    default: true
  skyblock.skills.use:
    description: Allows opening the skills menu
    default: true
  skyblock.skills.admin:
    description: Allows admin skill commands
    default: op
  skyblock.collections.use:
    description: Allows opening the collections menu
    default: true
  skyblock.collections.admin:
    description: Allows admin collection commands
    default: op
  skyblock.*:
    description: All SkyBlock permissions
    default: op
    children:
      skyblock.use: true
      skyblock.admin: true
      skyblock.menu.use: true
      skyblock.skills.use: true
      skyblock.skills.admin: true
      skyblock.collections.use: true
      skyblock.collections.admin: true
