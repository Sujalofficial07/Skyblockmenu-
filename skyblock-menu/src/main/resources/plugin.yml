name: SkyBlockMenu
version: 1.0.0
main: com.skyblock.menu.SkyBlockMenuPlugin
api-version: '1.21'
description: SkyBlock Menu Module
authors: [ SkyBlock Team ]
depend: [ SkyBlockUtils, SkyBlockDatabase ]

commands:
  sbmenu:
    description: Opens the SkyBlock main menu directly
    usage: /sbmenu
    permission: skyblock.menu.use
    aliases: [ skymenu ]

permissions:
  skyblock.menu.use:
    description: Allows opening the SkyBlock menu
    default: true
  skyblock.menu.admin:
    description: Allows admin menu actions
    default: op
