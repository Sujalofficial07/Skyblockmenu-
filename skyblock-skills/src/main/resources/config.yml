# SkyBlock Skills Module Configuration

skills:
  # Whether to show level-up messages in chat
  levelup-messages: true

  # Whether to show XP gain messages
  xp-messages: false

  # XP multiplier (default 1.0)
  xp-multiplier: 1.0

  # Max levels per skill (override defaults)
  max-levels:
    farming: 50
    mining: 50
    combat: 50
    fishing: 50
    foraging: 50
    enchanting: 50
    alchemy: 50
    taming: 50
    carpentry: 50
    runecrafting: 25

  # XP per action overrides (set to -1 to use defaults)
  xp-values:
    farming:
      wheat: 3.0
      carrot: 3.0
      potato: 3.0
      pumpkin: 3.0
      melon: 3.0
      mushroom: 3.0
      cocoa: 3.0
      cactus: 3.0
      sugar_cane: 3.0
      nether_wart: 5.0
    mining:
      stone: 1.0
      coal_ore: 5.0
      iron_ore: 10.0
      gold_ore: 18.0
      lapis_ore: 21.0
      redstone_ore: 27.5
      diamond_ore: 46.5
      emerald_ore: 65.5
      nether_quartz_ore: 12.0
      obsidian: 6.9
    foraging:
      oak_log: 6.0
      spruce_log: 6.0
      birch_log: 6.0
      jungle_log: 6.0
      acacia_log: 6.0
      dark_oak_log: 6.0
    combat:
      zombie: 2.0
      skeleton: 2.0
      spider: 2.0
      creeper: 4.0
      witch: 6.0
      enderman: 8.0
      blaze: 10.0
      ghast: 10.0
      wither_skeleton: 14.0
      guardian: 14.0
      elder_guardian: 40.0
      wither: 200.0
      ender_dragon: 200.0
    fishing:
      fish: 6.0
      entity: 6.0

  # Skill level-up messages format
  messages:
    levelup: "&r &r&6&l  SKILL LEVEL UP &r&a{skill} &r&7{old} ➜ &r&a{new}"
    xp-gain: "&r &r&b+{xp} {skill} XP &r&7({current}/{max})"

  # GUI settings
  gui:
    title: "&0Skills"
    size: 54
    progress-bar-length: 20
    progress-bar-filled-char: "█"
    progress-bar-empty-char: "░"
    progress-bar-filled-color: "&a"
    progress-bar-empty-color: "&8"
