name: SkyBlockSkills
version: 1.0.0
main: com.skyblock.skills.SkyBlockSkillsPlugin
api-version: '1.21'
description: SkyBlock Skills Module
authors: [ SkyBlock Team ]
depend: [ SkyBlockUtils, SkyBlockDatabase, SkyBlockMenu ]

commands:
  skills:
    description: Opens the Skills menu
    usage: /skills
    permission: skyblock.skills.use
    aliases: [ skill, myskills ]
  givexp:
    description: Give skill XP to a player (admin)
    usage: /givexp <player> <skill> <amount>
    permission: skyblock.skills.admin

permissions:
  skyblock.skills.use:
    description: Allows opening the skills menu
    default: true
  skyblock.skills.admin:
    description: Allows admin skill commands
    default: op
